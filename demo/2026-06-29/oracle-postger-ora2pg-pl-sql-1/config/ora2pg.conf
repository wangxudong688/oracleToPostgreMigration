#
# ora2pg.conf - Docker Compose 网络配置
#
ORACLE_DSN   dbi:Oracle:host=oracle;sid=FREE;port=1521
ORACLE_USER  system
ORACLE_PWD   oracle
SCHEMA       SYSTEM

PG_DSN       dbi:Pg:dbname=target_db;host=postgres;port=5432
PG_USER      postgres
PG_PWD       postgres

PLSQL_PGSQL  1
CONSTRAINTS  1
PACKAGE_AS_SCHEMA 1
SYNONYM_TO_VIEW   1
MVIEW_TO_VIEW     1

DATA_LIMIT   10000
TRUNCATE_TABLE  1
DISABLE_TRIGGERS 1
DROP_TABLE       1
